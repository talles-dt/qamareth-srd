<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="6" fill="#06070d"/>

  <!-- Anel externo -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#c9a44b" stroke-width="0.8" opacity="0.5"/>

  <!-- Crescente lunar (máscara via clipPath diferencial) -->
  <!-- Círculo externo da lua -->
  <circle cx="16" cy="16" r="8.5" fill="rgba(201,164,75,0.12)" clip-path="url(#fav-crescent)"/>
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#c9a44b" stroke-width="1.2"
    clip-path="url(#fav-crescent)" opacity="0.9"/>

  <defs>
    <clipPath id="fav-crescent">
      <!-- Retângulo menos o círculo deslocado = crescente -->
      <path d="
        M 32,0 L 32,32 L 0,32 L 0,0 Z
        M 23,15.5
        m -7.3,0
        a 7.3,7.3 0 1,0 14.6,0
        a 7.3,7.3 0 1,0 -14.6,0
      " fill-rule="evenodd"/>
    </clipPath>
  </defs>

  <!-- Pauta musical (3 linhas simplificadas) -->
  <g stroke="#c9a44b" stroke-width="0.7" opacity="0.6">
    <line x1="6"  y1="14.5" x2="26" y2="14.5"/>
    <line x1="6"  y1="16"   x2="26" y2="16"/>
    <line x1="6"  y1="17.5" x2="26" y2="17.5"/>
  </g>

  <!-- Losango central -->
  <path d="M16,12.5 L18.5,16 L16,19.5 L13.5,16 Z"
    fill="rgba(201,164,75,0.15)" stroke="#c9a44b" stroke-width="0.8"/>

  <!-- Ponto central -->
  <circle cx="16" cy="16" r="1.5" fill="#e4c47a" opacity="0.95"/>
</svg>
